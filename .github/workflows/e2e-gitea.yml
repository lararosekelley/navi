# Hermetic end-to-end test: a real navi loop against Dockerized Gitea + Mailpit.
#
# No external accounts or secrets: it stands up Gitea and Mailpit, seeds two users
# + a PR + a review request, runs navi (Gitea source -> email destination), and
# asserts the email lands in Mailpit. Because it needs no secrets, it runs on every
# push/PR (unlike the live e2e in e2e.yml).
name: E2E (Gitea)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-gitea-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitea-mailpit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Start Mailpit and Gitea
        run: |
          docker run -d --name navi-mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit:latest
          docker run -d --name navi-gitea -p 3000:3000 \
            -e GITEA__security__INSTALL_LOCK=true \
            -e GITEA__server__ROOT_URL=http://localhost:3000/ \
            gitea/gitea:1.22
          for i in $(seq 1 90); do
            curl -fsS http://localhost:3000/api/v1/version >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Seed a Gitea admin token
        run: |
          docker exec -u git navi-gitea gitea admin user create \
            --username navi-admin --password 'navi-admin-pass-1' \
            --email admin@navi.local --admin --must-change-password=false
          token=$(curl -fsS -u navi-admin:navi-admin-pass-1 -X POST \
            http://localhost:3000/api/v1/users/navi-admin/tokens \
            -H 'Content-Type: application/json' \
            -d '{"name":"admin","scopes":["write:admin","write:user"]}' | jq -r .sha1)
          echo "GITEA_ADMIN_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Run the Gitea -> Mailpit e2e
        env:
          GITEA_URL: http://localhost:3000
          MAILPIT_HTTP: http://localhost:8025
          MAILPIT_SMTP_HOST: localhost
          MAILPIT_SMTP_PORT: "1025"
        run: cargo run --features e2e --bin navi-e2e-gitea

      - name: Gitea logs on failure
        if: failure()
        run: docker logs navi-gitea | tail -50
