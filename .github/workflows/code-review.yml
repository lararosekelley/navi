name: "Code Review Bot"

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: code-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bot-code-review:
    # Only the repo owner can trigger the bot, so a contributor's PR or a stray
    # `@bot` comment never spends the API key. The association lives on a
    # different payload field per event (the PR vs the comment).
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.author_association == 'OWNER' && contains(github.event.comment.body, '@bot')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.author_association == 'OWNER' && contains(github.event.comment.body, '@bot review'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          use_sticky_comment: "true"
          track_progress: "true"
          classify_inline_comments: "true"

          prompt: |
            You are a code review bot. Read docs/CODE_REVIEW_BOT.md — it contains your
            complete instructions, philosophy, and review process. Follow it exactly.

            Context:
            - REPO: ${{ github.repository }}
            - PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            - PR_TITLE: ${{ github.event.pull_request.title || '' }}
            - PR_DRAFT: ${{ github.event.pull_request.draft || false }}
            - EVENT: ${{ github.event_name }}

            If EVENT is "pull_request": execute the full review process from CODE_REVIEW_BOT.md.
            Post inline comments for actionable findings only. Output one summary. Nothing else.

            If EVENT is "pull_request_review_comment" or "issue_comment": you are responding to
            a follow-up question or discussion. Read the comment, understand the context, and
            respond helpfully using your knowledge of the codebase and the PR. Do not re-run the
            full review unless explicitly asked.

            You may also see the results of CI checks (cargo test across the OS matrix, clippy,
            rustfmt, markdownlint, commitlint, e2e) on this PR. If CI has failed, incorporate
            those failures into your analysis — note which checks failed, whether the failures
            relate to the changes in this PR, and whether they reveal issues beyond what you
            found in your own review. Do not simply restate CI output; add insight about root
            causes and whether the failures are blocking.

          claude_args: >-
            --model claude-sonnet-4-6
            --allowedTools
            "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh run view:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment"
