# Configuration for markdownlint-cli2

globs:
  - "**/*.md"

ignores:
  - node_modules/**
  - target/**
  - docs/temp/**

config:
  default: true

  # Line length: 120 chars, exclude code blocks and tables
  MD013:
    line_length: 120
    code_blocks: false
    tables: false

  # Allow duplicate headings if not siblings
  MD024:
    siblings_only: true

  # Allow inline HTML (badges, images)
  MD033: false

  # Don't require the first line to be a top-level heading
  MD041: false

  # Don't enforce a specific table pipe-spacing style (compact vs padded)
  MD060: false
