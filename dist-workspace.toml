[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# release.yml is hand-patched: the `host` job's `if`/`needs` is edited to require
# the custom-e2e gate to succeed, so a failing e2e blocks the release (dist only
# gates the build jobs on plan-jobs, not host/announce). allow-dirty stops
# `dist generate`/`dist plan` from clobbering or rejecting that edit. Re-apply the
# host patch by hand after any intentional `dist generate`.
allow-dirty = ["ci"]
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "lararosekelley/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Plan jobs to run in CI
plan-jobs = ["./e2e"]
# Publish jobs to run in CI
publish-jobs = ["homebrew", "./publish-crates"]
# Whether to install an updater program
install-updater = false
# Custom message to display on successful install
# No backticks: the installer prints this via a shell, so `...` would be
# command-substituted (actually run) at install time.
install-success-msg = "navi installed! Run 'navi init' to create your config, then 'navi test-slack'."

# The single user-facing binary shipped in the artifacts.
[dist.binaries]
"*" = ["navi"]
