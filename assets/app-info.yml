# for use when setting up slack apps, discord apps, etc.
metadata:
  name: "navi"
  bg_color: "#b34d7f"
  short_desc: "🧚‍♀️ a friendly helper to guide you through the day-to-day noise of code review"
  long_desc: |
    a friendly helper to guide you through the day-to-day noise of code
    review. navi hooks up to a source (github/gitlab/gitea) and
    destination (email/slack/discord) to let you know when you have
    pending code reviews, replies to your comments, and more. this
    software is free, open-source, highly configurable, and runs locally!

    see https://larakelley.com/posts/navi for more 🧚‍♀️
